<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@font-face { font-family:'Poppins'; src:url('../fonts/Poppins-Regular.ttf') format('truetype'); font-weight:400; }
@font-face { font-family:'Poppins'; src:url('../fonts/Poppins-SemiBold.ttf') format('truetype'); font-weight:600; }
@font-face { font-family:'Poppins'; src:url('../fonts/Poppins-Bold.ttf') format('truetype'); font-weight:700; }
</style>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; font-family:'Poppins',sans-serif; padding:20px 24px; display:flex; gap:32px; flex-wrap:wrap; }
.col { display:flex; flex-direction:column; gap:4px; }
.tag { font-size:10px; color:#6b7280; font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-bottom:4px; }
.sample { font-size:24px; color:#fff; line-height:1.3; }
</style>
</head><body>
  <div class="col">
    <div class="tag">Regular · 400</div>
    <div class="sample" style="font-weight:400">Poppins Regular</div>
    <div style="font-size:13px;color:rgb(157,162,174);font-weight:400;margin-top:4px">Body copy, descriptions, captions</div>
  </div>
  <div class="col">
    <div class="tag">Medium · 500</div>
    <div class="sample" style="font-weight:500">Poppins Medium</div>
    <div style="font-size:13px;color:rgb(157,162,174);font-weight:400;margin-top:4px">FAQ questions, subheadings</div>
  </div>
  <div class="col">
    <div class="tag">SemiBold · 600</div>
    <div class="sample" style="font-weight:600">Poppins SemiBold</div>
    <div style="font-size:13px;color:rgb(157,162,174);font-weight:400;margin-top:4px">Emphasis, display numbers</div>
  </div>
  <div class="col">
    <div class="tag">Bold · 700</div>
    <div class="sample" style="font-weight:700">Poppins Bold</div>
    <div style="font-size:13px;color:rgb(157,162,174);font-weight:400;margin-top:4px">Headings, CTAs, section titles</div>
  </div>
</body></html>
