<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:rgb(1,4,11); font-family:'Poppins',sans-serif; }
.hero {
  position:relative; overflow:hidden;
  background: linear-gradient(rgba(0,0,0,0) 0%, rgba(45,0,225,0.2) 78%),
              linear-gradient(rgba(0,0,0,0) 0%, rgba(45,0,225,0.45) 100%),
              linear-gradient(rgb(0,0,0),rgb(0,0,0));
  min-height:340px; display:flex; align-items:flex-start; padding:40px 80px;
}
.blob-left {
  position:absolute; left:20px; top:0; width:160px; height:280px;
  background:linear-gradient(rgba(28,8,100,0.7) 0%, rgba(1,0,27,0) 100%);
  clip-path:polygon(0 87% 46% 0% 85% 0% 100% 90% 50% 100%);
}
.blob-right {
  position:absolute; right:0; top:0; width:320px; height:200px;
  background:linear-gradient(rgba(47,16,160,0.7) 0%, rgba(0,0,0,0) 100%);
  clip-path:polygon(100% 76% 16% 0% 0% 0% 81% 100% 100% 76%);
}
.content { position:relative; z-index:2; max-width:500px; display:flex; flex-direction:column; gap:16px; }
h1 { font-size:36px; font-weight:700; color:#fff; line-height:1.3; }
.subtitle { font-size:16px; color:rgb(237,237,241); line-height:1.4; }
.dropzone {
  background:rgba(61,62,90,0.7); border:1px dashed rgb(72,73,92);
  border-radius:12px; padding:32px; display:flex; flex-direction:column;
  align-items:center; gap:8px;
}
.dropzone svg { opacity:.8; }
.dropzone span { font-size:14px; color:rgb(215,216,224); }
.templates-label { font-size:13px; font-weight:700; color:rgb(237,237,241); }
.templates { display:flex; gap:10px; }
.tmpl { width:96px; height:64px; border-radius:8px; background:rgb(30,41,59); border:1px solid rgba(155,53,255,0.3); }
.btn {
  height:52px; border-radius:40px;
  background:linear-gradient(rgb(52,141,255) 0%, rgb(155,53,255) 100%);
  border:none; font-family:'Poppins',sans-serif; font-size:18px; font-weight:700;
  color:#fff; padding:0 32px; cursor:pointer; align-self:flex-start;
}
</style>
</head><body>
<div class="hero">
  <div class="blob-left"></div>
  <div class="blob-right"></div>
  <div class="content">
    <h1>AI Creation Landing Page</h1>
    <p class="subtitle">Describe the user outcome in one clear, benefit-forward sentence</p>
    <div class="dropzone">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" stroke="rgb(72,73,92)" stroke-width="1.5"/>
        <path d="M20 12v16M12 20h16" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Upload, paste, or start from an example</span>
    </div>
    <div class="templates-label">Choose a template</div>
    <div class="templates">
      <div class="tmpl"></div>
      <div class="tmpl"></div>
      <div class="tmpl"></div>
      <div class="tmpl"></div>
    </div>
    <button class="btn">Start Creating</button>
  </div>
</div>
</body></html>
