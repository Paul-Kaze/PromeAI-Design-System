<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; font-family:'Poppins',sans-serif; padding:20px; }
.row { display:flex; gap:12px; flex-wrap:wrap; }
.grad { border-radius:12px; height:72px; display:flex; align-items:flex-end; padding:10px; flex:1; min-width:180px; }
.grad span { font-size:11px; font-weight:500; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.9); line-height:1.4; }
</style>
</head><body>
<div class="row">
  <div class="grad" style="background:linear-gradient(rgb(52,141,255) 0%, rgb(155,53,255) 100%)">
    <span>gradient-primary<br>CTA Button / Pill</span>
  </div>
  <div class="grad" style="background:linear-gradient(rgb(59,130,246) 0%, rgb(147,51,234) 100%)">
    <span>gradient-cta-section<br>Full-bleed CTA Section</span>
  </div>
  <div class="grad" style="background:linear-gradient(rgb(34,197,94) 0%, rgb(59,130,246) 100%); border-radius:10px; flex:0; width:72px; min-width:72px; height:72px;">
    <span>step<br>icon</span>
  </div>
  <div class="grad" style="background:linear-gradient(rgba(28,8,100,0.7) 0%, rgba(1,0,27,0) 100%); border:1px solid #222;">
    <span>gradient-blob-left<br>Hero Decoration</span>
  </div>
  <div class="grad" style="background:linear-gradient(rgba(47,16,160,0.7) 0%, rgba(0,0,0,0) 100%); border:1px solid #222;">
    <span>gradient-blob-right<br>Hero Decoration</span>
  </div>
</div>
</body></html>
