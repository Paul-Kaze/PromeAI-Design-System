<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:26px;background:var(--bg-0);color:var(--fg-1);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid var(--border-4);background:var(--bg-3);color:var(--fg-2);}
  .label{background:var(--chip-label-bg);color:#fff;border:0;}
  .coin{background:rgba(255,173,43,0.12);border:1px solid rgba(255,173,43,0.3);color:#FFAD2B;}
  .upgrade{background:rgba(212,244,98,0.12);border:1px solid rgba(212,244,98,0.3);color:#D4F462;}
  .dot{width:6px;height:6px;border-radius:999px;background:currentColor;}
  .tag{background:transparent;color:var(--fg-3);border-color:var(--border-4);}
  .pill{border-radius:999px;padding:4px 12px;}
</style></head>
<body>
  <span class="chip label">Auto</span>
  <span class="chip">Model · GPT-Image</span>
  <span class="chip"><span class="dot" style="color:#77ED21"></span>Ready</span>
  <span class="chip coin">◆ 1,240 coins</span>
  <span class="chip upgrade">Upgrade</span>
  <span class="chip tag pill">#character-sheet</span>
  <span class="chip tag pill">#video</span>
</body></html>
