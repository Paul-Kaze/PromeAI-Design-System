<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{
    margin:0;padding:26px;background:var(--bg-0);color:var(--fg-1);
    display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
    font-family:var(--font-sans);
  }
  .card{
    position:relative;aspect-ratio:1/1;border-radius:18px;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    color:#fff;
  }
  .card.relaxed   { background: linear-gradient(135deg,#4A527A 0%,#3B4168 100%); }
  .card.pro       { background: linear-gradient(135deg,#5B4AA8 0%,#3A2656 100%); }
  .card.highlight { background: linear-gradient(135deg,#4CC0E8 0%,#7A5CF0 100%); }

  .tag{
    position:absolute;top:0;right:0;
    background:rgba(10,12,20,0.55);
    border-bottom-left-radius:18px;
    padding:10px 18px;
    font-size:13px;font-weight:500;color:#E8E9F2;
    backdrop-filter:blur(6px);
  }
  .pct{
    font-size:48px;font-weight:700;letter-spacing:-0.02em;line-height:1;
    font-variant-numeric:tabular-nums;
  }
  .status{
    font-size:16px;font-weight:400;color:rgba(255,255,255,0.72);
  }

  /* Highlight card uses a bar instead of status text */
  .bar{
    position:absolute;left:22px;right:22px;bottom:72px;
    height:3px;border-radius:3px;background:rgba(255,255,255,0.35);overflow:hidden;
  }
  .bar::after{
    content:"";display:block;width:21%;height:100%;background:#fff;border-radius:3px;
  }

  .caption{
    font-family:var(--font-mono);font-size:10px;color:var(--fg-4);text-align:center;
    margin-top:8px;
  }
  .wrap{display:flex;flex-direction:column;}
</style></head>
<body>
  <div class="wrap">
    <div class="card relaxed">
      <div class="tag">Relaxed Mode</div>
      <div class="pct">21%</div>
      <div class="status">Generating</div>
    </div>
    <div class="caption">Relaxed · slate-indigo</div>
  </div>

  <div class="wrap">
    <div class="card pro">
      <div class="tag">Pro Leisure Mode</div>
      <div class="pct">21%</div>
      <div class="status">Generating</div>
    </div>
    <div class="caption">Pro Leisure · violet</div>
  </div>

  <div class="wrap">
    <div class="card highlight">
      <div class="pct">21%</div>
      <div class="bar"></div>
    </div>
    <div class="caption">Highlight · brand gradient + bar</div>
  </div>
</body></html>
