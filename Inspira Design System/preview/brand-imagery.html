<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:var(--bg-0);color:var(--fg-1);display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .tile{background:var(--bg-1);border:1px solid var(--border-2);border-radius:12px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:128px;justify-content:center;}
  .tile img{max-width:60px;max-height:60px;object-fit:contain;}
  .n{font-size:11px;color:var(--fg-4);font-family:var(--font-mono);letter-spacing:.02em;text-align:center;}
  .bg{background:url('../assets/coin_detail_bg.jpg') center/cover;aspect-ratio:16/9;grid-column:span 2;border-radius:12px;border:1px solid var(--border-2);display:flex;align-items:flex-end;padding:12px;color:var(--fg-3);font-size:11px;font-family:var(--font-mono);}
</style></head>
<body>
  <div class="tile"><img src="../assets/agent-generate.png" alt=""><div class="n">agent-generate</div></div>
  <div class="tile"><img src="../assets/agent-upload-normal.png" alt=""><div class="n">agent-upload</div></div>
  <div class="tile"><img src="../assets/member_icon.png" alt=""><div class="n">member_icon</div></div>
  <div class="tile"><img src="../assets/empty.png" alt=""><div class="n">empty-state</div></div>
  <div class="bg">coin_detail_bg.jpg · the one decorative backdrop</div>
  <div class="tile"><img src="../assets/loading.svg" alt=""><div class="n">loading.svg</div></div>
  <div class="tile"><img src="../assets/btn-logo.png" alt=""><div class="n">btn-logo</div></div>
</body></html>
