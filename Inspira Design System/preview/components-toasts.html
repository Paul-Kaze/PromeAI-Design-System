<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:26px;background:var(--bg-0);color:var(--fg-1);display:flex;flex-direction:column;gap:12px;}
  .toast{display:inline-flex;align-items:center;gap:15px;background:var(--bg-2);border:1px solid var(--border-3);border-radius:15px;padding:10px 15px;min-height:24px;}
  .toast.raised{background:var(--bg-3);border-color:#3E3F4E;}
  .ic{width:24px;height:24px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;flex:none;}
  .ic.s{background:var(--gradient-success);}
  .ic.e{background:var(--gradient-error);}
  .tx{display:flex;flex-direction:column;gap:2px;}
  .tx b{font-size:14px;font-weight:700;}
  .tx span{font-size:12px;color:var(--fg-2);}
  .cta{font-size:14px;font-weight:500;color:#000;background:#fff;border:0;border-radius:9px;padding:6px 10px;cursor:pointer;margin-left:auto;}
</style></head>
<body>
  <div class="toast"><span class="ic s"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0A1A05" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><b>Saved</b></div>
  <div class="toast"><span class="ic e"><svg width="14" height="14" viewBox="0 0 24 24" fill="#1A0500"><rect x="11" y="6" width="2" height="7" rx="1"/><circle cx="12" cy="17" r="1.3"/></svg></span><b>Error toast</b></div>
  <div class="toast"><span class="ic s"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0A1A05" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><div class="tx"><b>Canvas renamed successfully</b><span>Your changes were saved.</span></div></div>
  <div class="toast raised" style="min-width:360px"><span class="ic s"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0A1A05" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><div class="tx"><b>New version available</b><span>Click install to restart and apply.</span></div><button class="cta">Got it!</button></div>
</body></html>
