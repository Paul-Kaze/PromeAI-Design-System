<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);}
  .fam{display:grid;grid-template-columns:70px 1fr;gap:18px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-2);}
  .fam:last-child{border-bottom:0;}
  .fam .w{font-family:var(--font-mono);font-size:10px;color:var(--fg-4);letter-spacing:.04em;text-transform:uppercase;}
  .fam .spec{font-size:20px;}
  .note{margin-top:14px;color:var(--fg-3);font-size:11px;line-height:1.5;}
</style></head>
<body>
  <div class="fam"><span class="w">400</span><span class="spec" style="font-weight:400">Poppins Regular — Aa Bb Cc 123</span></div>
  <div class="fam"><span class="w">600</span><span class="spec" style="font-weight:600">Poppins SemiBold — Aa Bb Cc 123</span></div>
  <div class="fam"><span class="w">700</span><span class="spec" style="font-weight:700">Poppins Bold — Aa Bb Cc 123</span></div>
  <div class="note">One family · no italics · fallback: Helvetica Neue, PingFang SC, Microsoft YaHei.</div>
</body></html>
