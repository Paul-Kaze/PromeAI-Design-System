  .cell{background:var(--bg-1);border:1px solid var(--border-2);border-radius:9px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:#fff;}
  .cell svg{width:22px;height:22px;stroke-width:1.5;}
  .n{font-size:10px;color:var(--fg-4);text-align:center;margin-top:6px;font-family:var(--font-mono);}
  .wrap{display:flex;flex-direction:column;gap:4px;}
  .note{margin-top:16px;color:var(--fg-3);font-size:11px;line-height:1.5;}
  code{font-family:var(--font-mono);color:#C9CCD5;font-size:11px;}
</style></head>
