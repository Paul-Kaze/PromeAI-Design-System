<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--bg-0);color:var(--fg-1);}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .cell{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .sq{width:100%;aspect-ratio:1;background:var(--bg-3);border:1px solid var(--border-2);}
  b{font-size:12px;font-weight:600;}
  span{color:var(--fg-4);font-family:var(--font-mono);font-size:10px;}
  .lab{text-align:center;}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="sq" style="border-radius:6px"></div><div class="lab"><b>sm</b><br><span>6px · chip</span></div></div>
    <div class="cell"><div class="sq" style="border-radius:9px"></div><div class="lab"><b>md</b><br><span>9px · button</span></div></div>
    <div class="cell"><div class="sq" style="border-radius:12px"></div><div class="lab"><b>lg</b><br><span>12px · panel</span></div></div>
    <div class="cell"><div class="sq" style="border-radius:15px"></div><div class="lab"><b>xl</b><br><span>15px · toast</span></div></div>
    <div class="cell"><div class="sq" style="border-radius:20px"></div><div class="lab"><b>2xl</b><br><span>20px · hero</span></div></div>
    <div class="cell"><div class="sq" style="border-radius:999px"></div><div class="lab"><b>full</b><br><span>999px · pill</span></div></div>
  </div>
</body></html>
