<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-0);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg-1);border:1px solid var(--border-2);border-radius:var(--radius-md);}
  .dot{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);flex:none;}
  .meta b{display:block;font-size:12px;font-weight:600;color:#fff;line-height:1.3;}
  .meta span{color:var(--fg-4);font-family:var(--font-mono);font-size:10px;}
</style></head>
<body>
<div class="grid">
  <div class="row"><div class="dot" style="background:#FFFFFF"></div><div class="meta"><b style="color:#fff">fg-1 · primary</b><span>#FFFFFF</span></div></div>
  <div class="row"><div class="dot" style="background:#C9CCD5"></div><div class="meta"><b style="color:#C9CCD5">fg-2 · secondary</b><span>#C9CCD5</span></div></div>
  <div class="row"><div class="dot" style="background:#B6B9CA"></div><div class="meta"><b style="color:#B6B9CA">fg-3 · tip</b><span>#B6B9CA</span></div></div>
  <div class="row"><div class="dot" style="background:#A8ADC1"></div><div class="meta"><b style="color:#A8ADC1">fg-4 · label</b><span>#A8ADC1</span></div></div>
  <div class="row"><div class="dot" style="background:#C5C7D5"></div><div class="meta"><b style="color:#C5C7D5">fg-5 · empty</b><span>#C5C7D5</span></div></div>
  <div class="row"><div class="dot" style="background:#6C6F82"></div><div class="meta"><b style="color:#6C6F82">fg-muted · disabled</b><span>#6C6F82</span></div></div>
</div>
</body></html>
