<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:26px;background:var(--bg-0);color:var(--fg-1);display:flex;flex-direction:column;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  label{font-size:12px;color:var(--fg-4);letter-spacing:.02em;}
  input,textarea{font-family:var(--font-sans);background:var(--bg-1);color:#fff;border:1px solid var(--border-5);border-radius:9px;padding:10px 12px;font-size:14px;outline:none;}
  input:focus,textarea:focus{border-color:#6f8fcf;box-shadow:0 0 0 2px rgba(78,156,255,0.3);}
  textarea{resize:vertical;min-height:72px;}
  .composer{background:var(--bg-1);border:1px solid var(--border-2);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px;}
  .composer .rt{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .pill{background:var(--bg-3);border:1px solid var(--border-4);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--fg-2);display:inline-flex;align-items:center;gap:6px;}
  .send{width:30px;height:30px;border-radius:9px;background:var(--gradient-brand);border:0;display:inline-flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;}
  .send svg{width:16px;height:16px;}
  input::placeholder,textarea::placeholder{color:var(--fg-muted);}
</style></head>
<body>
  <div class="field">
    <label>Template name</label>
    <input placeholder="Enter template name…">
  </div>
  <div class="composer">
    <textarea placeholder="Enter your design requirements"></textarea>
    <div class="rt">
      <div style="display:flex;gap:6px"><span class="pill">Model · Auto</span><span class="pill">Image ×1</span></div>
      <button class="send" aria-label="Send"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
    </div>
  </div>
</body></html>
