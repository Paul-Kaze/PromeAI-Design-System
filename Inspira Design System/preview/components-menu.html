<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:26px;background:var(--bg-0);color:var(--fg-1);display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;}
  .menu{background:var(--bg-4);border:1px solid var(--border-4);border-radius:12px;padding:6px;min-width:200px;box-shadow:0 12px 40px rgba(0,0,0,0.55);}
  .item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:14px;cursor:pointer;color:var(--fg-2);}
  .item:hover{background:var(--bg-hover);color:#fff;}
  .item .ic{width:16px;height:16px;color:var(--fg-4);}
  .divider{height:1px;background:var(--border-4);margin:6px 4px;}
  .danger{color:#FF7A7A;}
  .danger:hover{background:rgba(255,67,67,0.12);color:#FFB7B7;}
  .kb{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head>
<body>
  <div class="menu">
    <div class="item">Rename Canvas <span class="kb">⌘R</span></div>
    <div class="item">Share Canvas</div>
    <div class="item">Export Canvas</div>
    <div class="item">Save Snapshot</div>
    <div class="divider"></div>
    <div class="item danger">Delete Canvas</div>
  </div>
  <div class="menu" style="min-width:160px">
    <div class="item">Image</div>
    <div class="item">Video</div>
    <div class="item" style="color:#fff;background:var(--bg-hover)">Text ·  active</div>
  </div>
</body></html>
