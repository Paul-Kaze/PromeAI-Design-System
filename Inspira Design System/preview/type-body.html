<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--bg-0);color:var(--fg-1);}
  .row{display:flex;align-items:baseline;gap:20px;padding:10px 0;border-bottom:1px solid var(--border-2);}
  .row:last-child{border-bottom:0;}
  .row .tag{width:160px;font-family:var(--font-mono);font-size:10px;color:var(--fg-4);letter-spacing:.04em;text-transform:uppercase;flex:none;}
</style></head>
<body>
  <div class="row"><span class="tag">body · 14/400/1.4</span><span style="font-size:14px">Enter your design requirements</span></div>
  <div class="row"><span class="tag">body-b · 14/700</span><span style="font-size:14px;font-weight:700">Success toast</span></div>
  <div class="row"><span class="tag">description · 12/400</span><span style="font-size:12px;color:var(--fg-2)">Notification description will be here.</span></div>
  <div class="row"><span class="tag">label · 12/400</span><span style="font-size:12px;color:var(--fg-4);letter-spacing:.02em">Image Quantity</span></div>
  <div class="row"><span class="tag">tip · 11/400</span><span style="font-size:11px;color:var(--fg-3)">Recharge to continue generating images.</span></div>
  <div class="row"><span class="tag">button · 14/500</span><span style="font-size:14px;font-weight:500">Got it!</span></div>
</body></html>
