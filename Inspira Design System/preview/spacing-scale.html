<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--bg-0);color:var(--fg-1);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .cell{background:var(--bg-1);border:1px solid var(--border-2);border-radius:var(--radius-md);padding:12px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;}
  .box{background:var(--gradient-brand);height:44px;width:100%;border-radius:4px;}
  b{font-size:12px;font-weight:600;}
  span{color:var(--fg-4);font-family:var(--font-mono);font-size:10px;}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="height:4px"></div><b>space-1</b><span>4px</span></div>
    <div class="cell"><div class="box" style="height:8px"></div><b>space-2</b><span>8px</span></div>
    <div class="cell"><div class="box" style="height:10px"></div><b>space-3</b><span>10px · toast</span></div>
    <div class="cell"><div class="box" style="height:12px"></div><b>space-4</b><span>12px · panel</span></div>
    <div class="cell"><div class="box" style="height:15px"></div><b>space-5</b><span>15px · toast pad</span></div>
    <div class="cell"><div class="box" style="height:20px"></div><b>space-6</b><span>20px</span></div>
    <div class="cell"><div class="box" style="height:24px"></div><b>space-7</b><span>24px</span></div>
    <div class="cell"><div class="box" style="height:32px"></div><b>space-8</b><span>32px</span></div>
    <div class="cell"><div class="box" style="height:40px"></div><b>space-10</b><span>40px</span></div>
    <div class="cell"><div class="box" style="height:48px"></div><b>space-12</b><span>48px</span></div>
  </div>
</body></html>
