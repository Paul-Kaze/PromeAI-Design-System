<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:16px;background:#0b0c10;color:#fff;font-family:var(--font-ui);display:flex;gap:12px}
  .card{width:200px;background:#1E202A;border-radius:12px;overflow:hidden;box-shadow:0 12px 32px rgba(0,0,0,.45)}
  .card img{width:100%;height:140px;object-fit:cover;display:block}
  .card .meta{padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
  .title{font-size:13px;font-weight:600}
  .sub{font-size:11px;color:rgba(255,255,255,.6)}
  .model{background:#412C85;color:#fff;border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:6px;width:200px}
  .row{display:flex;align-items:center;gap:10px}
  .ico{width:21px;height:21px;border-radius:4px;background:#000;display:grid;place-items:center;font-size:13px}
</style></head><body>
  <div class="card">
    <img src="../assets/imagery/architecture.jpg">
    <div class="meta"><div><div class="title">Cliffside Villa</div><div class="sub">Architecture · 4 results</div></div><div class="sub">2m</div></div>
  </div>
  <div class="model">
    <div class="row"><div class="ico">🍌</div><div class="title">Nano Banana Pro</div></div>
    <div class="sub">Best at following your prompts.</div>
  </div>
</body></html>
