<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:16px;background:#0b0c10;color:#fff;font-family:var(--font-ui)}
  .row{display:flex;gap:14px;align-items:flex-end}
  .tile{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:#858A99}
  .sw{width:72px;height:60px;background:linear-gradient(135deg,#272B34,#15181D);outline:1px solid rgba(255,255,255,.06)}
  .n{color:#fff;font-weight:600}
</style></head><body>
<div class="row">
  <div class="tile"><div class="sw" style="border-radius:3px"></div><div class="n">3</div><div>xs · chip</div></div>
  <div class="tile"><div class="sw" style="border-radius:6px"></div><div class="n">6</div><div>sm · field</div></div>
  <div class="tile"><div class="sw" style="border-radius:9px"></div><div class="n">9</div><div>md · card</div></div>
  <div class="tile"><div class="sw" style="border-radius:12px"></div><div class="n">12</div><div>lg</div></div>
  <div class="tile"><div class="sw" style="border-radius:16px"></div><div class="n">16</div><div>xl</div></div>
  <div class="tile"><div class="sw" style="border-radius:24px"></div><div class="n">24</div><div>2xl · hero</div></div>
  <div class="tile"><div class="sw" style="border-radius:999px"></div><div class="n">pill</div><div>999</div></div>
</div>
</body></html>
