<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:18px;background:#0b0c10;color:#fff;font-family:var(--font-ui);display:flex;flex-direction:column;gap:10px;max-width:340px}
  .field{display:flex;flex-direction:column;gap:6px}
  label{font-size:12px;color:rgba(255,255,255,.7)}
  input,textarea{background:#212327;border:1px solid #323843;color:#fff;padding:10px 12px;border-radius:6px;font:inherit;font-size:14px;outline:none}
  input:focus,textarea:focus{border-color:#9B35FF;box-shadow:0 0 0 2px rgba(155,53,255,.2)}
  .drop{border:1px dashed #5A606D;background:#212327;border-radius:6px;height:72px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:12px;flex-direction:column;gap:4px}
  .count{font-size:11px;color:rgba(255,255,255,.5)}
</style></head><body>
  <div class="field"><label>Prompt</label><input value="interior render, warm lighting"></div>
  <div class="field">
    <div style="display:flex;justify-content:space-between"><label>Reference</label><span style="color:#91A1FF;font-size:12px;text-decoration:underline">choose from assets</span></div>
    <div class="drop">+<span class="count">0 / 5</span></div>
  </div>
</body></html>
