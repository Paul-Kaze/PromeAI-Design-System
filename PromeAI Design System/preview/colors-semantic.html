<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:16px;background:#0b0c10;font-family:var(--font-ui);color:#fff}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:10px;padding:12px;min-height:90px;display:flex;flex-direction:column;justify-content:space-between;font-size:11px}
  .n{opacity:.8;font-size:10px}
  .h{font-weight:600;font-size:12px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.06);font-size:10px;color:rgba(255,255,255,.75);width:max-content}
  .dot{width:6px;height:6px;border-radius:50%}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#C7F14C;color:#0B0C10">
    <div class="chip" style="background:rgba(0,0,0,.15);color:#0B0C10"><span class="dot" style="background:#0B0C10"></span>success</div>
    <div><div class="h">Lime · success / live</div><div class="n">#C7F14C · pills, toasts, coin amts</div></div>
  </div>
  <div class="sw" style="background:#FF0000;color:#fff">
    <div class="chip"><span class="dot" style="background:#fff"></span>error</div>
    <div><div class="h">Error red</div><div class="n">#FF0000 · validation, destructive</div></div>
  </div>
  <div class="sw" style="background:#FF8D1A;color:#0B0C10">
    <div class="chip" style="background:rgba(0,0,0,.15);color:#0B0C10"><span class="dot" style="background:#0B0C10"></span>warn</div>
    <div><div class="h">Orange · live dot</div><div class="n">#FF8D1A · status dots, warnings</div></div>
  </div>
  <div class="sw" style="background:#4378E0;color:#fff">
    <div class="chip"><span class="dot" style="background:#fff"></span>info</div>
    <div><div class="h">Indigo</div><div class="n">#4378E0 · links on light</div></div>
  </div>
  <div class="sw" style="background:#1E202A;color:#fff;outline:1px solid rgba(255,255,255,.06)">
    <div class="chip" style="color:#91A1FF;background:rgba(145,161,255,.1)">link</div>
    <div><div class="h">Link blue (on dark)</div><div class="n">#91A1FF · inline underlines</div></div>
  </div>
</div>
</body></html>
