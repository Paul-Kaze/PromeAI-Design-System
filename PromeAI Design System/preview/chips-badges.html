<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:18px;background:#0b0c10;color:#fff;font-family:var(--font-ui);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500}
  .dot{width:6px;height:6px;border-radius:50%}
  .tag{padding:3px 8px;border-radius:3px;font-size:11px;font-weight:600}
</style></head><body>
  <span class="chip" style="background:rgba(255,255,255,.08);color:#fff">All</span>
  <span class="chip" style="background:var(--prome-grad-alt);color:#fff">Architecture</span>
  <span class="chip" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)">Interior</span>
  <span class="chip" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)">Product</span>
  <span class="chip" style="background:#C7F14C;color:#0B0C10"><span class="dot" style="background:#0B0C10"></span>Live</span>
  <span class="chip" style="background:rgba(255,141,26,.15);color:#FF8D1A"><span class="dot" style="background:#FF8D1A"></span>Generating</span>
  <span class="tag" style="background:#C7F14C;color:#0B0C10">NEW</span>
  <span class="tag" style="background:rgba(125,100,249,.25);color:#B3A6FF">PRO</span>
  <span class="tag" style="background:rgba(255,112,133,.2);color:#FF7085">BETA</span>
  <span class="chip" style="background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(6px)"><img src="../assets/icons/coin.png" style="width:12px;height:12px"> 2 coins</span>
</body></html>
