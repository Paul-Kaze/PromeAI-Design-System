<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:12px;background:#0b0c10;color:#fff;font-family:var(--font-ui);display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  figure{margin:0;border-radius:10px;overflow:hidden;position:relative;aspect-ratio:1/1}

</style></head><body>
  <figure><img src="../assets/imagery/architecture.jpg"><figcaption>Architecture</figcaption></figure>
  <figure><img src="../assets/imagery/commercial-space.jpg"><figcaption>Commercial Space</figcaption></figure>
  <figure><img src="../assets/imagery/character-design.jpg"><figcaption>Character Design</figcaption></figure>
  <figure><img src="../assets/imagery/digital-art.jpg"><figcaption>Digital Art</figcaption></figure>
</body></html>
