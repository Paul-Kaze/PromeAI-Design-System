<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:16px;background:#0b0c10;font-family:var(--font-ui);color:#fff}
  .row{display:flex;gap:10px;align-items:stretch}
  .sw{flex:1;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;min-height:100px;box-shadow:0 1px 0 rgba(255,255,255,.06) inset}
  .sw .n{font-size:11px;opacity:.8}
  .sw .h{font-size:12px;font-weight:600}
  .hed{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#858A99;margin:0 0 8px}
</style></head><body>
<p class="hed">Brand gradient & signal accents</p>
<div class="row">
  <div class="sw" style="background:var(--prome-grad-alt);color:#fff"><div class="h">Primary gradient</div><div class="n">#348DFF → #9B35FF · 135°</div></div>
  <div class="sw" style="background:var(--prome-grad-soft);color:#fff"><div class="h">Soft gradient</div><div class="n">#3996CF → rgba(125,100,249,.89)</div></div>
  <div class="sw" style="background:#c7f14c;color:#0B0C10"><div class="h">Lime · signal</div><div class="n">#C7F14C</div></div>
  <div class="sw" style="background:#FF7085;color:#0B0C10"><div class="h">Coral</div><div class="n">#FF7085</div></div>
  <div class="sw" style="background:#F984FF;color:#0B0C10"><div class="h">Magenta</div><div class="n">#F984FF</div></div>
  <div class="sw" style="background:#412C85;color:#fff"><div class="h">Plum · selected</div><div class="n">#412C85</div></div>
</div>
</body></html>
