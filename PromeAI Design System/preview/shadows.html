<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:18px;background:#0b0c10;color:#fff;font-family:var(--font-ui)}
  .row{display:flex;gap:16px}
  .tile{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:110px;background:#1E202A;border-radius:12px;font-size:10px;color:#858A99;gap:6px}
  .n{color:#fff;font-weight:600;font-size:11px}
  .sw{width:58px;height:36px;border-radius:8px;background:#1E202A}
</style></head><body>
<div class="row">
  <div class="tile"><div class="sw" style="box-shadow:0 1px 2px rgba(0,0,0,.25)"></div><div class="n">shadow-1</div><div>0 1 2 · .25</div></div>
  <div class="tile"><div class="sw" style="box-shadow:0 4px 12px rgba(0,0,0,.30)"></div><div class="n">shadow-2</div><div>0 4 12 · .30</div></div>
  <div class="tile"><div class="sw" style="box-shadow:0 12px 32px rgba(0,0,0,.45)"></div><div class="n">shadow-pop</div><div>0 12 32 · .45</div></div>
  <div class="tile"><div class="sw" style="box-shadow:0 0 0 1px rgba(255,255,255,.06),0 12px 40px rgba(105,70,255,.25);background:var(--prome-grad-alt)"></div><div class="n">glow</div><div>brand purple</div></div>
  <div class="tile"><div class="sw" style="box-shadow:inset 0 1px 1px rgba(1,255,179,.25);background:#272B34"></div><div class="n">inset-hi</div><div>inner gloss</div></div>
</div>
</body></html>
