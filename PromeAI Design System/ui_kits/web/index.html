<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PromeAI · Web UI Kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" href="../../assets/logo/favicon.ico" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #000; color: #fff; font-family: var(--font-ui); }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  .layout { display: flex; min-height: 100vh; }
  .stage { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .screen-picker {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(13,13,15,.9); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.1); border-radius: 999px;
    padding: 6px; display: flex; gap: 4px; z-index: 50;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  .screen-picker button {
    border: 0; background: transparent; color: rgba(255,255,255,.7);
    font: 600 12px/1 Inter, sans-serif; padding: 8px 16px; border-radius: 999px;
    cursor: pointer;
  }
  .screen-picker button.active {
    background: linear-gradient(135deg,#348DFF,#9B35FF); color: #fff;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  img { -webkit-user-drag: none; user-select: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- rewrite asset paths since scenes reference assets/… relative to project root -->
<base href="../../" />

<script type="text/babel" src="ui_kits/web/components.jsx" data-presets="env,react"></script>
<script type="text/babel" src="ui_kits/web/HomeScreen.jsx" data-presets="env,react"></script>
<script type="text/babel" src="ui_kits/web/MagicEditorScreen.jsx" data-presets="env,react"></script>
<script type="text/babel" src="ui_kits/web/InspiraScreen.jsx" data-presets="env,react"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  const SCREENS = [
    { id: 'home',    label: 'Home',         title: 'Home',         Comp: HomeScreen },
    { id: 'inspira', label: 'Inspira',      title: 'Inspira',      Comp: InspiraScreen },
    { id: 'edit',    label: 'Magic Editor', title: 'Magic Editor', Comp: MagicEditorScreen },
  ];

  const App = () => {
    const [current, setCurrent] = useState(() => localStorage.getItem('promeai-screen') || 'home');
    useEffect(() => { localStorage.setItem('promeai-screen', current); }, [current]);
    const scr = SCREENS.find(s => s.id === current) || SCREENS[0];
    const Comp = scr.Comp;
    return (
      <div className="layout">
        <SideRail current={current} onNav={setCurrent} />
        <div className="stage" data-screen-label={scr.label}>
          <TopBar title={scr.title} />
          <Comp />
        </div>
        <div className="screen-picker">
          {SCREENS.map(s => (
            <button key={s.id}
              className={s.id === current ? 'active' : ''}
              onClick={() => setCurrent(s.id)}>
              {s.label}
            </button>
          ))}
        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
